<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Laboria - Portal de Empleo y Cursos</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
    
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="/assets/icon-192x192.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Estilos Base Compartidos -->
    <link rel="stylesheet" href="/shared/base-styles.css">
    <link rel="stylesheet" href="/styles/styles.css">
    <link rel="stylesheet" href="/styles/accessibility-ux.css">
    
    <!-- Scripts compartidos (orden optimizado) -->
    <script src="/shared/constants.js"></script>
    <script src="/js/api-client.js"></script>
    <script src="/shared/ui-system.js"></script>
    <script src="/shared/notification-system.js"></script>
    <script src="/shared/navigation-system.js"></script>
    
    <!-- Font Awesome -->
    <script src="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/js/all.min.js"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Theme Switcher -->
    <script src="/styles/theme-switcher.js"></script>
    <script src="/styles/landing-page-optimized.js"></script>
    
    <!-- Meta tags para SEO -->
    <meta name="description" content="Plataforma integral de empleo y formación profesional">
    <meta name="keywords" content="empleos, trabajo, cursos, desarrollo profesional, Laboria">
    <meta name="author" content="Laboria Team">
    
    <!-- Open Graph para redes sociales -->
    <meta property="og:title" content="Laboria - Portal de Empleo y Cursos">
    <meta property="og:description" content="Plataforma integral de empleo y formación profesional">
    <meta property="og:type" content="website">
    
    <!-- Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://fonts.googleapis.com;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net;
        font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net;
        img-src 'self' data: https:;
        connect-src 'self' http://localhost:3000 http://127.0.0.1:3000 http://localhost:5500 http://127.0.0.1:5500 https://cdn.jsdelivr.net https://api.openai.com ws://localhost:3000 ws://127.0.0.1:3000 ws://localhost:5500 ws://127.0.0.1:5500;
        frame-src 'self';
        object-src 'none';
        base-uri 'self';
        form-action 'self';
    ">
    
    <!-- Estilos específicos de la página de login -->
    <style>
        /* Logo responsive */
        .logo-image img {
            width: 100%;
            max-width: 240px;
            height: auto;
            max-height: 360px;
            object-fit: contain;
        }
        
        /* Login card responsive */
        .login-card {
            max-width: 500px;
            width: 90%;
            margin: 2rem auto;
            padding: 2.5rem;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        /* Logo animations */
        .animated-logo {
            text-align: center;
            margin-bottom: var(--spacing-xl);
            animation: fadeIn 1s ease-out;
        }
        
        .tagline {
            font-size: 1.1rem;
            color: var(--theme-text-secondary);
            margin: var(--spacing-md) 0;
            font-weight: 500;
        }
        
        /* Form styles */
        .modern-form {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-lg);
        }
        
        .form-group {
            margin-bottom: var(--spacing-md);
        }
        
        .form-group label {
            display: block;
            margin-bottom: var(--spacing-xs);
            font-weight: 500;
            color: var(--theme-text-primary);
        }
        
        .form-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .form-input {
            width: 100%;
            padding: var(--spacing-md) var(--spacing-lg);
            padding-left: 3rem;
            border: 2px solid var(--theme-border);
            border-radius: var(--border-radius-md);
            font-size: 1rem;
            transition: all var(--transition-normal);
            background: rgba(255, 255, 255, 0.9);
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--theme-primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .form-input-icon {
            position: absolute;
            left: var(--spacing-md);
            color: var(--theme-text-secondary);
            z-index: 1;
        }
        
        /* Buttons */
        .btn-primary {
            background: var(--theme-gradient);
            color: white;
            border: none;
            padding: var(--spacing-md) var(--spacing-xl);
            border-radius: var(--border-radius-md);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-normal);
            box-shadow: var(--shadow-md);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        
        .btn-admin-access {
            background: linear-gradient(135deg, #764ba2 0%, #f093fb 100%);
            color: white;
            border: none;
            padding: var(--spacing-sm) var(--spacing-md);
            border-radius: var(--border-radius-sm);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all var(--transition-normal);
            margin-top: var(--spacing-md);
        }
        
        .btn-admin-access:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }
        
        /* Links */
        .forgot-link {
            color: var(--theme-text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color var(--transition-normal);
        }
        
        .forgot-link:hover {
            color: var(--theme-primary);
        }
        
        .register-link {
            color: var(--theme-primary);
            text-decoration: none;
            font-weight: 500;
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        
        .register-link:hover {
            text-decoration: none;
            background: rgba(102, 126, 234, 0.1);
            transform: translateY(-1px);
        }
        
        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: var(--spacing-xl);
        }
        
        .admin-access {
            text-align: center;
            margin-top: var(--spacing-lg);
        }
        
        /* Toggle password */
        .toggle-password {
            position: absolute;
            right: var(--spacing-md);
            background: none;
            border: none;
            color: var(--theme-text-secondary);
            cursor: pointer;
            z-index: 1;
        }
        
        .toggle-password:hover {
            color: var(--theme-primary);
        }
        
        /* Screens */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .screen.active {
            opacity: 1;
            visibility: visible;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .login-card {
                margin: 1rem;
                padding: 1.5rem;
                width: 95%;
            }
            
            .logo-image img {
                max-width: 180px;
                max-height: 270px;
            }
            
            .tagline {
                font-size: 0.9rem;
            }
            
            .shape {
                display: none;
            }
            
            .modern-form {
                gap: 1rem;
            }
            
            .form-group {
                margin-bottom: 1rem;
            }
        }
        
        @media (max-width: 480px) {
            .login-card {
                margin: 0.5rem;
                padding: 1rem;
                width: 98%;
            }
            
            .logo-image img {
                max-width: 140px;
                max-height: 210px;
            }
            
            .tagline {
                font-size: 0.8rem;
                margin: 0.5rem 0;
            }
            
            .btn-primary {
                padding: 0.75rem 1.5rem;
                font-size: 0.9rem;
            }
        }
        
        @media (max-width: 360px) {
            .login-card {
                padding: 0.75rem;
            }
            
            .logo-image img {
                max-width: 120px;
                max-height: 180px;
            }
        }
    </style>
</head>
<body>
    <!-- Skip link para accesibilidad -->
    <a href="#main-content" class="skip-link">Saltar al contenido principal</a>
    
    <div class="main-container" id="main-content">
        <!-- Pantalla de Login de Usuarios -->
        <div id="userLoginScreen" class="screen active">
            <div class="animated-bg">
                <div class="floating-shapes">
                    <div class="shape shape-1"></div>
                    <div class="shape shape-2"></div>
                    <div class="shape shape-3"></div>
                    <div class="shape shape-4"></div>
                    <div class="shape shape-5"></div>
                </div>
            </div>
            <div class="centered-container">
                <div class="login-card">
                    <div class="logo animated-logo">
                        <div class="logo-image">
                            <img src="/assets/logo-blanco-vertical.png" alt="Laboria Logo">
                        </div>
                        <p class="tagline">🚀 Tu futuro profesional empieza aquí</p>
                    </div>
                    
                    <form id="userLoginForm" class="modern-form">
                        <div class="form-group">
                            <label for="userEmail">Email</label>
                            <div class="form-input-wrapper">
                                <i class="fas fa-envelope form-input-icon"></i>
                                <input type="email" id="userEmail" class="form-input" placeholder="tu@email.com" required>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="userPassword">Contraseña</label>
                            <div class="form-input-wrapper">
                                <i class="fas fa-lock form-input-icon"></i>
                                <input type="password" id="userPassword" class="form-input" placeholder="Tu contraseña" required>
                                <button type="button" class="toggle-password" data-target="userPassword">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                            <div style="margin-top: 0.5rem; text-align: right;">
                                <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn-primary">
                            <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
                        </button>
                    </form>
                    
                    <div class="login-footer">
                        <p>¿No tienes cuenta? <a href="#" class="register-link" onclick="showRegisterForm()"><strong>Crear cuenta gratuita</strong></a></p>
                        <p style="margin-top: 0.5rem; font-size: 0.9rem; opacity: 0.8;">🚀 Únete a miles de profesionales</p>
                    </div>
                    
                    <!-- Botón para ir al login de administradores -->
                    <div class="admin-access">
                        <button id="goToAdminLogin" class="btn-admin-access">
                            <i class="fas fa-shield-alt"></i> Panel Administrador
                        </button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Pantalla de Login de Administradores -->
        <div id="adminLoginScreen" class="screen">
            <div class="animated-bg admin-bg">
                <div class="floating-shapes">
                    <div class="shape shape-1"></div>
                    <div class="shape shape-2"></div>
                    <div class="shape shape-3"></div>
                    <div class="shape shape-4"></div>
                    <div class="shape shape-5"></div>
                </div>
            </div>
            <div class="centered-container">
                <div class="login-card">
                    <div class="logo animated-logo">
                        <div class="logo-image">
                            <img src="/assets/logo-blanco-vertical.png" alt="Laboria Logo">
                        </div>
                        <p class="tagline">🛡️ Panel de Administración</p>
                    </div>
                    
                    <form id="adminLoginForm" class="modern-form">
                        <div class="form-group">
                            <label for="adminEmail">Email Admin</label>
                            <div class="form-input-wrapper">
                                <i class="fas fa-user-shield form-input-icon"></i>
                                <input type="email" id="adminEmail" class="form-input" placeholder="admin@laboria.com" required>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="adminPassword">Contraseña Admin</label>
                            <div class="form-input-wrapper">
                                <i class="fas fa-lock form-input-icon"></i>
                                <input type="password" id="adminPassword" class="form-input" placeholder="Contraseña de administrador" required>
                                <button type="button" class="toggle-password" data-target="adminPassword">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn-primary">
                            <i class="fas fa-shield-alt"></i> Acceder Admin
                        </button>
                    </form>
                    
                    <div class="login-footer">
                        <p><a href="#" class="register-link" onclick="showUserLogin()"><strong>Volver al login de usuarios</strong></a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Scripts específicos de la página -->
    <script>
        // Configuración de página
        window.pageOptions = {
            title: 'Portal de Empleo y Cursos',
            subtitle: 'Tu futuro profesional empieza aquí',
            description: 'Plataforma integral de empleo y formación profesional',
            showHeader: false,
            showFooter: false
        };
        
        // Funciones específicas de login
        function showUserLogin() {
            document.getElementById('userLoginScreen').classList.add('active');
            document.getElementById('adminLoginScreen').classList.remove('active');
        }
        
        function showAdminLogin() {
            document.getElementById('userLoginScreen').classList.remove('active');
            document.getElementById('adminLoginScreen').classList.add('active');
        }
        
        // Función para mostrar formulario de registro
        function showRegisterForm() {
            const loginForm = document.getElementById('userLoginForm');
            const loginFooter = document.querySelector('.login-footer');
            
            // Crear formulario de registro
            const registerForm = document.createElement('form');
            registerForm.id = 'registerForm';
            registerForm.className = 'modern-form';
            registerForm.innerHTML = `
                <div class="form-group">
                    <label for="registerUsername">Nombre de Usuario</label>
                    <div class="form-input-wrapper">
                        <i class="fas fa-user form-input-icon"></i>
                        <input type="text" id="registerUsername" class="form-input" name="username" required 
                               placeholder="Elige un nombre de usuario">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="registerEmail">Email</label>
                    <div class="form-input-wrapper">
                        <i class="fas fa-envelope form-input-icon"></i>
                        <input type="email" id="registerEmail" class="form-input" name="email" required 
                               placeholder="tu@email.com">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="registerPassword">Contraseña</label>
                    <div class="form-input-wrapper">
                        <i class="fas fa-lock form-input-icon"></i>
                        <input type="password" id="registerPassword" class="form-input" name="password" required 
                               placeholder="Mínimo 8 caracteres">
                        <button type="button" class="toggle-password" data-target="registerPassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="registerConfirmPassword">Confirmar Contraseña</label>
                    <div class="form-input-wrapper">
                        <i class="fas fa-lock form-input-icon"></i>
                        <input type="password" id="registerConfirmPassword" class="form-input" name="confirmPassword" required 
                               placeholder="Repite tu contraseña">
                        <button type="button" class="toggle-password" data-target="registerConfirmPassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="registerFullName">Nombre Completo (Opcional)</label>
                    <div class="form-input-wrapper">
                        <i class="fas fa-id-card form-input-icon"></i>
                        <input type="text" id="registerFullName" class="form-input" name="fullName" 
                               placeholder="Tu nombre completo">
                    </div>
                </div>
                
                <button type="submit" class="btn-primary">
                    <i class="fas fa-user-plus"></i> Crear Cuenta
                </button>
                
                <div class="login-footer">
                    <p>¿Ya tienes cuenta? <a href="#" class="register-link" onclick="hideRegisterForm()"><strong>Iniciar sesión</strong></a></p>
                </div>
            `;
            
            // Reemplazar el formulario de login con el de registro
            loginForm.style.display = 'none';
            loginFooter.style.display = 'none';
            
            const loginCard = loginForm.parentElement;
            loginCard.insertBefore(registerForm, loginFooter);
            
            // Añadir event listener al formulario de registro
            registerForm.addEventListener('submit', handleRegister);
            
            // Re-inicializar toggle password para los nuevos campos
            document.querySelectorAll('.toggle-password').forEach(button => {
                button.addEventListener('click', function() {
                    const targetId = this.getAttribute('data-target');
                    const input = document.getElementById(targetId);
                    const icon = this.querySelector('i');
                    
                    if (!input || !icon) {
                        console.error('❌ No se encontró el input o el icono:', { targetId, input, icon });
                        return;
                    }
                    
                    if (input.type === 'password') {
                        input.type = 'text';
                        icon.classList.remove('fa-eye');
                        icon.classList.add('fa-eye-slash');
                    } else {
                        input.type = 'password';
                        icon.classList.remove('fa-eye-slash');
                        icon.classList.add('fa-eye');
                    }
                });
            });
        }
        
        // Función para ocultar formulario de registro
        function hideRegisterForm() {
            const registerForm = document.getElementById('registerForm');
            const loginForm = document.getElementById('userLoginForm');
            const loginFooter = document.querySelector('.login-footer');
            
            if (registerForm) {
                registerForm.remove();
            }
            
            loginForm.style.display = 'block';
            loginFooter.style.display = 'block';
        }
        
        // Función de registro de usuario
        async function handleRegister(event) {
            event.preventDefault();
            
            const username = document.getElementById('registerUsername').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('registerConfirmPassword').value;
            const fullName = document.getElementById('registerFullName').value;
            
            // Validaciones
            if (password !== confirmPassword) {
                if (window.LaboriaNotifications) {
                    window.LaboriaNotifications.show('Las contraseñas no coinciden', 'error');
                } else {
                    alert('Las contraseñas no coinciden');
                }
                return;
            }
            
            if (password.length < 8) {
                if (window.LaboriaNotifications) {
                    window.LaboriaNotifications.show('La contraseña debe tener al menos 8 caracteres', 'error');
                } else {
                    alert('La contraseña debe tener al menos 8 caracteres');
                }
                return;
            }
            
            try {
                console.log('Intentando registrar usuario:', { username, email, fullName });
                
                const response = await window.LaboriaAPI.registerUsuario({
                    username,
                    email,
                    password,
                    fullName
                });
                
                if (response.success) {
                    console.log('Registro exitoso:', response);
                    if (window.LaboriaNotifications) {
                        window.LaboriaNotifications.show('¡Cuenta creada exitosamente! Por favor inicia sesión.', 'success');
                    } else {
                        alert('¡Cuenta creada exitosamente! Por favor inicia sesión.');
                    }
                    
                    // Limpiar formulario y volver al login
                    hideRegisterForm();
                    document.getElementById('userLoginForm').reset();
                } else {
                    console.error('Error en registro:', response.message);
                    if (window.LaboriaNotifications) {
                        window.LaboriaNotifications.show(response.message || 'Error en el registro', 'error');
                    } else {
                        alert(response.message || 'Error en el registro');
                    }
                }
            } catch (error) {
                console.error('Error en registro:', error);
                if (window.LaboriaNotifications) {
                    window.LaboriaNotifications.show('Error de conexión. Intenta nuevamente.', 'error');
                } else {
                    alert('Error de conexión. Intenta nuevamente.');
                }
            }
        }
        
        // Función de login de usuario
        async function handleUserLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('userEmail').value;
            const password = document.getElementById('userPassword').value;
            
            try {
                console.log('Intentando login de usuario:', email);
                
                const response = await window.LaboriaAPI.loginUsuario(email, password);
                
                if (response.success) {
                    console.log('Login de usuario exitoso:', response);
                    
                    // Guardar datos del usuario
                    window.LaboriaAPI.usuarioActual = response.data.user;
                    window.LaboriaAPI.saveAuthTokens(response.data.token, response.data.user);
                    
                    // Redirigir según el rol
                    if (response.data.user.rol === 'user') {
                        window.location.href = '/usuario/perfil.html';
                    } else {
                        window.location.href = '/pages/admin-master/InicioAdmin.html';
                    }
                } else {
                    console.error('Error en login:', response.message);
                    if (window.LaboriaNotifications) {
                        window.LaboriaNotifications.show(response.message || 'Error en el login', 'error');
                    } else {
                        alert(response.message || 'Error en el login');
                    }
                }
            } catch (error) {
                console.error('Error en login:', error);
                if (window.LaboriaNotifications) {
                    window.LaboriaNotifications.show('Error de conexión. Intenta nuevamente.', 'error');
                } else {
                    alert('Error de conexión. Intenta nuevamente.');
                }
            }
        }
        
        // Función de login de administrador
        async function handleAdminLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            
            try {
                console.log('Intentando login de administrador:', email);
                
                const response = await window.LaboriaAPI.loginAdmin(email, password);
                
                if (response.success) {
                    console.log('Login de administrador exitoso:', response);
                    
                    // Guardar datos del administrador
                    window.LaboriaAPI.usuarioActual = response.data.user;
                    window.LaboriaAPI.saveAuthTokens(response.data.token, response.data.user);
                    
                    // Redirigir según el rol
                    if (response.data.user.rol === 'admin_master') {
                        window.location.href = '/pages/admin-master/InicioAdmin.html';
                    } else if (response.data.user.rol === 'admin_invitado') {
                        window.location.href = '/pages/admin-invitado/Inicio-Invi-Admin.html';
                    } else {
                        window.location.href = '/usuario/perfil.html';
                    }
                } else {
                    console.error('Error en login:', response.message);
                    if (window.LaboriaNotifications) {
                        window.LaboriaNotifications.show(response.message || 'Error en el login', 'error');
                    } else {
                        alert(response.message || 'Error en el login');
                    }
                }
            } catch (error) {
                console.error('Error en login:', error);
                if (window.LaboriaNotifications) {
                    window.LaboriaNotifications.show('Error de conexión. Intenta nuevamente.', 'error');
                } else {
                    alert('Error de conexión. Intenta nuevamente.');
                }
            }
        }
        
        // Inicialización cuando el DOM está listo
        document.addEventListener('DOMContentLoaded', function() {
            // Inicializar base
            if (typeof window.LaboriaBase !== 'undefined') {
                window.LaboriaBase.init(window.pageOptions);
            }
            
            // Event listeners
            document.getElementById('userLoginForm').addEventListener('submit', handleUserLogin);
            document.getElementById('adminLoginForm').addEventListener('submit', handleAdminLogin);
            document.getElementById('goToAdminLogin').addEventListener('click', showAdminLogin);
            
            // Toggle password
            document.querySelectorAll('.toggle-password').forEach(button => {
                button.addEventListener('click', function() {
                    const targetId = this.getAttribute('data-target');
                    const input = document.getElementById(targetId);
                    const icon = this.querySelector('i');
                    
                    if (input.type === 'password') {
                        input.type = 'text';
                        icon.classList.remove('fa-eye');
                        icon.classList.add('fa-eye-slash');
                    } else {
                        input.type = 'password';
                        icon.classList.remove('fa-eye-slash');
                        icon.classList.add('fa-eye');
                    }
                });
            });
        });
    </script>
</body>
</html>
