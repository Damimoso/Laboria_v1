<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Laboria - [PAGE_TITLE]</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="../assets/favicon.ico">
    
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="../assets/icon-192x192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="../manifest.json">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Estilos Base Compartidos -->
    <link rel="stylesheet" href="../shared/base-styles.css">
    <link rel="stylesheet" href="../styles/styles.css">
    <link rel="stylesheet" href="../styles/accessibility-ux.css">
    
    <!-- Scripts compartidos (orden optimizado) -->
    <script src="../shared/constants.js"></script>
    <script src="../js/api-client.js"></script>
    <script src="../shared/ui-system.js"></script>
    <script src="../shared/notification-system.js"></script>
    <script src="../shared/navigation-system.js"></script>
    
    <!-- Font Awesome -->
    <script src="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/js/all.min.js"></script>
    
    <!-- Chart.js (si se necesita) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Theme Switcher -->
    <script src="../styles/theme-switcher.js"></script>
    
    <!-- Meta tags para SEO -->
    <meta name="description" content="[PAGE_DESCRIPTION]">
    <meta name="keywords" content="empleos, trabajo, cursos, desarrollo profesional, Laboria">
    <meta name="author" content="Laboria Team">
    
    <!-- Open Graph para redes sociales -->
    <meta property="og:title" content="Laboria - [PAGE_TITLE]">
    <meta property="og:description" content="[PAGE_DESCRIPTION]">
    <meta property="og:type" content="website">
    <meta property="og:image" content="../assets/og-image.jpg">
    
    <!-- Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://fonts.googleapis.com;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net;
        font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net;
        img-src 'self' data: https:;
        connect-src 'self' http://localhost:3000 http://127.0.0.1:3000 http://localhost:5500 http://127.0.0.1:5500 https://cdn.jsdelivr.net ws://localhost:3000 ws://127.0.0.1:3000 ws://localhost:5500 ws://127.0.0.1:5500;
        frame-src 'self';
        object-src 'none';
        base-uri 'self';
        form-action 'self';
    ">
    
    <!-- Estilos específicos de página -->
    <style>
        /* Estilos específicos que pueden ser sobreescritos por páginas hijas */
        .page-header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: var(--border-radius-lg);
            padding: var(--spacing-xl);
            margin-bottom: var(--spacing-xl);
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .page-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--theme-text-primary);
            margin-bottom: var(--spacing-sm);
            background: var(--theme-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .page-subtitle {
            color: var(--theme-text-secondary);
            font-size: 1.1rem;
            margin-bottom: 0;
        }
        
        /* Contenido principal */
        .page-content {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: var(--border-radius-lg);
            padding: var(--spacing-xl);
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: fadeIn 0.6s ease-out;
        }
        
        /* Footer base */
        .page-footer {
            text-align: center;
            padding: var(--spacing-xl) 0;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
        }
        
        /* Responsive para página */
        @media (max-width: 768px) {
            .page-header,
            .page-content {
                padding: var(--spacing-lg);
                margin: var(--spacing-md);
            }
            
            .page-title {
                font-size: 1.5rem;
            }
            
            .page-subtitle {
                font-size: 1rem;
            }
        }
        
        @media (max-width: 480px) {
            .page-header,
            .page-content {
                padding: var(--spacing-md);
                margin: var(--spacing-sm);
            }
            
            .page-title {
                font-size: 1.25rem;
            }
        }
    </style>
</head>
<body>
    <!-- Skip link para accesibilidad -->
    <a href="#main-content" class="skip-link">Saltar al contenido principal</a>
    
    <div class="main-container">
        <!-- Animated Background -->
        <div class="animated-bg">
            <div class="floating-shapes">
                <div class="shape shape-1"></div>
                <div class="shape shape-2"></div>
                <div class="shape shape-3"></div>
                <div class="shape shape-4"></div>
                <div class="shape shape-5"></div>
            </div>
        </div>
        
        <!-- Contenedor principal -->
        <div class="centered-container">
            <!-- Header de página (opcional) -->
            <header class="page-header" id="page-header" style="display: none;">
                <h1 class="page-title" id="page-title">[PAGE_TITLE]</h1>
                <p class="page-subtitle" id="page-subtitle">[PAGE_SUBTITLE]</p>
            </header>
            
            <!-- Contenido principal -->
            <main class="page-content" id="main-content">
                [PAGE_CONTENT]
            </main>
            
            <!-- Footer de página (opcional) -->
            <footer class="page-footer" id="page-footer" style="display: none;">
                <p>&copy; 2026 Laboria - Todos los derechos reservados</p>
                <p>Hecho con ❤️ para profesionales como tú</p>
            </footer>
        </div>
    </div>
    
    <!-- Scripts base -->
    <script>
        // Funciones base compartidas
        window.LaboriaBase = {
            // Inicialización de página
            init: function(options = {}) {
                console.log('🚀 Inicializando página Laboria...');
                
                // Configurar título y descripción
                if (options.title) {
                    document.title = `Laboria - ${options.title}`;
                    const titleEl = document.getElementById('page-title');
                    if (titleEl) {
                        titleEl.textContent = options.title;
                        titleEl.parentElement.style.display = 'block';
                    }
                }
                
                if (options.subtitle) {
                    const subtitleEl = document.getElementById('page-subtitle');
                    if (subtitleEl) {
                        subtitleEl.textContent = options.subtitle;
                    }
                }
                
                if (options.description) {
                    const descMeta = document.querySelector('meta[name="description"]');
                    if (descMeta) {
                        descMeta.content = options.description;
                    }
                }
                
                // Mostrar/ocultar elementos
                if (options.showHeader) {
                    document.getElementById('page-header').style.display = 'block';
                }
                
                if (options.showFooter) {
                    document.getElementById('page-footer').style.display = 'block';
                }
                
                // Inicializar sistemas base
                if (typeof window.LaboriaUI !== 'undefined') {
                    window.LaboriaUI.init();
                }
                
                if (typeof window.LaboriaNotifications !== 'undefined') {
                    window.LaboriaNotifications.init();
                }
                
                console.log('✅ Página inicializada correctamente');
            },
            
            // Mostrar notificación
            showNotification: function(message, type = 'info') {
                if (typeof window.LaboriaNotifications !== 'undefined') {
                    window.LaboriaNotifications.show(message, type);
                } else {
                    console.log(`${type.toUpperCase()}: ${message}`);
                }
            },
            
            // Navegación
            navigate: function(path) {
                window.location.href = path;
            },
            
            // Verificar autenticación
            checkAuth: function() {
                if (typeof window.LaboriaAPI !== 'undefined') {
                    return window.LaboriaAPI.isAuthenticated();
                }
                return false;
            },
            
            // Redirigir si no está autenticado
            requireAuth: function(redirectPath = '../pages/index.html') {
                if (!this.checkAuth()) {
                    this.navigate(redirectPath);
                    return false;
                }
                return true;
            }
        };
        
        // Auto-inicialización cuando el DOM está listo
        document.addEventListener('DOMContentLoaded', function() {
            // Inicializar con opciones por defecto
            if (typeof window.pageOptions !== 'undefined') {
                window.LaboriaBase.init(window.pageOptions);
            } else {
                window.LaboriaBase.init();
            }
        });
        
        // Manejo de errores global
        window.addEventListener('error', function(e) {
            console.error('❌ Error en la página:', e.error);
            if (typeof window.LaboriaBase !== 'undefined') {
                window.LaboriaBase.showNotification('Ha ocurrido un error inesperado', 'error');
            }
        });
        
        // Manejo de promesas rechazadas no manejadas
        window.addEventListener('unhandledrejection', function(e) {
            console.error('❌ Promesa rechazada no manejada:', e.reason);
            if (typeof window.LaboriaBase !== 'undefined') {
                window.LaboriaBase.showNotification('Error de conexión', 'error');
            }
        });
    </script>
</body>
</html>
