# =============================================
# RENDER CONFIGURATION - LABORIA
# =============================================

services:
  # Backend API Service
  - type: web
    name: laboria-api
    env: node
    plan: free
    buildCommand: "cd backend && npm install --omit=dev"
    startCommand: "cd backend && node server-fase6.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://laboria-api.onrender.com

  # Frontend Static Service  
  - type: web
    name: laboria-frontend
    env: static
    plan: free
    buildCommand: "echo 'No build needed for static files'"
    staticPublishPath: ./frontend
    envVars:
      - key: API_BASE_URL
        value: https://laboria-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
